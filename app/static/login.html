<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bug Hunter — Sign in</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg?v=3.0.0" />
  <link rel="stylesheet" href="/static/styles.css?v=3.0.0" />
</head>
<body class="auth-body">
  <main class="auth-shell">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">
          <!-- Same revolver + ladybug brand -->
          <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <defs>
              <linearGradient id="brassG2" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#f5d089"/>
                <stop offset="50%" stop-color="#c9954a"/>
                <stop offset="100%" stop-color="#7a5621"/>
              </linearGradient>
              <linearGradient id="woodG2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7a4a2a"/>
                <stop offset="100%" stop-color="#4a2a18"/>
              </linearGradient>
              <radialGradient id="bugG2" cx="0.4" cy="0.35">
                <stop offset="0%" stop-color="#ff6b5e"/>
                <stop offset="60%" stop-color="#c83a30"/>
                <stop offset="100%" stop-color="#7a1e18"/>
              </radialGradient>
            </defs>
            <g transform="rotate(-18 32 32)">
              <rect x="14" y="28" width="28" height="6" rx="1.5" fill="url(#brassG2)" stroke="#3a2410" stroke-width="0.8"/>
              <circle cx="13.5" cy="31" r="1.2" fill="#1a0e08"/>
              <circle cx="38" cy="31" r="6" fill="url(#brassG2)" stroke="#3a2410" stroke-width="0.8"/>
              <circle cx="38" cy="31" r="1.6" fill="#1a0e08"/>
              <path d="M42 27 L46 24 L47 27 L44 29 Z" fill="url(#brassG2)" stroke="#3a2410" stroke-width="0.6"/>
              <path d="M40 36 Q42 42 44 42 L46 42 Q48 42 48 39 L48 36 Z" fill="none" stroke="#3a2410" stroke-width="1.4"/>
              <path d="M44 36 L52 50 L48 52 L41 38 Z" fill="url(#woodG2)" stroke="#2a1408" stroke-width="0.8"/>
            </g>
            <g transform="translate(14 16)">
              <ellipse cx="8" cy="9" rx="7" ry="6" fill="url(#bugG2)" stroke="#3a0d0a" stroke-width="0.7"/>
              <line x1="8" y1="3.5" x2="8" y2="14.5" stroke="#3a0d0a" stroke-width="0.7"/>
              <circle cx="4.5" cy="7" r="1.1" fill="#1a0a08"/>
              <circle cx="11.5" cy="7" r="1.1" fill="#1a0a08"/>
              <circle cx="4" cy="11" r="0.9" fill="#1a0a08"/>
              <circle cx="12" cy="11" r="0.9" fill="#1a0a08"/>
              <ellipse cx="8" cy="3.8" rx="3" ry="2.2" fill="#1a0a08"/>
            </g>
          </svg>
        </div>
        <h1>Bug Hunter</h1>
        <p class="auth-tagline">Sign in to continue</p>
      </div>

      <!-- Login form -->
      <form id="loginForm" class="auth-form" novalidate>
        <div id="loginAlert" class="auth-alert" hidden></div>
        <label class="field">
          <span>Email</span>
          <input name="email" type="email" required autocomplete="username" autofocus />
        </label>
        <label class="field">
          <span>Password</span>
          <input name="password" type="password" required autocomplete="current-password" />
        </label>
        <button type="submit" class="btn primary auth-submit" id="loginSubmit">Sign in</button>
        <div class="auth-links">
          <a href="#" id="showForgot">Forgot your password?</a>
          <button type="button" class="link-btn" id="loginThemeBtn">🌗 Theme</button>
        </div>
      </form>

      <!-- Forgot password form (toggled) -->
      <form id="forgotForm" class="auth-form" novalidate hidden>
        <div id="forgotAlert" class="auth-alert" hidden></div>
        <p class="auth-help">Enter your email and we'll send a reset link if an account exists.</p>
        <label class="field">
          <span>Email</span>
          <input name="email" type="email" required autocomplete="username" />
        </label>
        <button type="submit" class="btn primary auth-submit">Send reset link</button>
        <div class="auth-links">
          <a href="#" id="backToLogin">← Back to sign in</a>
        </div>
      </form>
    </div>
    <div class="auth-footnote">v3.0.0 · self-hosted · MIT</div>
  </main>

  <script>
  (() => {
    "use strict";
    const $ = (sel) => document.querySelector(sel);

    // Theme persists across pages.
    const stored = localStorage.getItem("theme") || "dark";
    document.documentElement.setAttribute("data-theme", stored);

    function showAlert(id, msg, kind = "error") {
      const el = $(id);
      el.textContent = msg;
      el.className = "auth-alert " + kind;
      el.hidden = false;
    }
    function hideAlerts() {
      $("#loginAlert").hidden = true;
      $("#forgotAlert").hidden = true;
    }

    $("#showForgot").addEventListener("click", (e) => {
      e.preventDefault();
      hideAlerts();
      $("#loginForm").hidden = true;
      $("#forgotForm").hidden = false;
      $("#forgotForm").elements.email.focus();
    });
    $("#backToLogin").addEventListener("click", (e) => {
      e.preventDefault();
      hideAlerts();
      $("#forgotForm").hidden = true;
      $("#loginForm").hidden = false;
      $("#loginForm").elements.email.focus();
    });

    $("#loginThemeBtn").addEventListener("click", () => {
      const cur = document.documentElement.getAttribute("data-theme");
      const next = cur === "dark" ? "light" : "dark";
      document.documentElement.setAttribute("data-theme", next);
      localStorage.setItem("theme", next);
    });

    $("#loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlerts();
      const f = e.target;
      const btn = $("#loginSubmit");
      btn.disabled = true; btn.textContent = "Signing in…";
      try {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify({
            email: f.elements.email.value.trim(),
            password: f.elements.password.value,
          }),
        });
        if (!res.ok) {
          let msg = "Sign in failed";
          try { msg = (await res.json()).detail || msg; } catch {}
          showAlert("#loginAlert", msg);
          return;
        }
        // Success — redirect to home (or `next` query param if provided).
        const params = new URLSearchParams(location.search);
        const next = params.get("next") || "/";
        location.href = next;
      } catch (err) {
        showAlert("#loginAlert", "Network error. Try again.");
      } finally {
        btn.disabled = false; btn.textContent = "Sign in";
      }
    });

    $("#forgotForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      hideAlerts();
      const f = e.target;
      const btn = f.querySelector("button[type=submit]");
      btn.disabled = true; btn.textContent = "Sending…";
      try {
        const res = await fetch("/api/auth/forgot-password", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: f.elements.email.value.trim() }),
        });
        if (res.status === 204) {
          showAlert("#forgotAlert",
            "If that email is registered, a reset link has been sent. Check your inbox.",
            "success");
        } else {
          let msg = "Request failed";
          try { msg = (await res.json()).detail || msg; } catch {}
          showAlert("#forgotAlert", msg);
        }
      } catch (err) {
        showAlert("#forgotAlert", "Network error. Try again.");
      } finally {
        btn.disabled = false; btn.textContent = "Send reset link";
      }
    });
  })();
  </script>
</body>
</html>
